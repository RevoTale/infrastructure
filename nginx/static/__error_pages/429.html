<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>RevoTale | 429</title>
  <style>
    html, body { margin: 0; min-height: 100%; }
    body {
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(255, 205, 96, 0.18), transparent 22rem),
        linear-gradient(180deg, #1b1404, #0a0904);
      color: #fff7ea;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }
    .panel {
      width: min(100%, 36rem);
      padding: 2rem;
      border: 1px solid rgba(255, 205, 96, 0.28);
      background: rgba(24, 19, 8, 0.86);
      box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.34);
    }
    .brand, .meta, a { font: 600 0.78rem/1.2 Consolas, monospace; letter-spacing: 0.12em; text-transform: uppercase; }
    .brand { color: #ffd56f; }
    .meta { color: #f0c57d; margin-top: 1.5rem; }
    h1 { margin: 1rem 0 0; font-size: clamp(4rem, 14vw, 6.5rem); line-height: 0.9; }
    p { margin: 1rem 0 0; color: #f3debd; font-size: 1rem; line-height: 1.7; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      color: #fff7ea;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 213, 111, 0.5);
      padding-bottom: 0.2rem;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand">RevoTale Edge</div>
    <h1>429</h1>
    <p>The edge rate limit was reached. Slow down for a moment and try again.</p>
    <a href="/">Return Home</a>
    <div class="meta">Too Many Requests</div>
  </main>
</body>
</html>
