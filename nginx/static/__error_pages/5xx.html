<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>RevoTale | 5xx</title>
  <style>
    html, body { margin: 0; min-height: 100%; }
    body {
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top right, rgba(255, 111, 129, 0.22), transparent 24rem),
        linear-gradient(180deg, #1a1021, #08070c);
      color: #fdf2f6;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }
    .panel {
      width: min(100%, 36rem);
      padding: 2rem;
      border: 1px solid rgba(255, 111, 129, 0.28);
      background: rgba(20, 13, 24, 0.88);
      box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.34);
    }
    .brand, .meta, a { font: 600 0.78rem/1.2 Consolas, monospace; letter-spacing: 0.12em; text-transform: uppercase; }
    .brand { color: #ff9aa7; }
    .meta { color: #dca4b2; margin-top: 1.5rem; }
    h1 { margin: 1rem 0 0; font-size: clamp(4rem, 14vw, 6.5rem); line-height: 0.9; }
    p { margin: 1rem 0 0; color: #e8c8d1; font-size: 1rem; line-height: 1.7; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      color: #fdf2f6;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 154, 167, 0.5);
      padding-bottom: 0.2rem;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand">RevoTale Edge</div>
    <h1>5xx</h1>
    <p>The request matched the edge, but the server-side flow failed before a healthy response returned.</p>
    <a href="/">Retry from Home</a>
    <div class="meta">Server Error</div>
  </main>
</body>
</html>
